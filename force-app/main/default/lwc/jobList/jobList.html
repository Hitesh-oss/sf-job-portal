<template>
    <lightning-card title="Job Listings" icon-name="standard:jobs">
        <template if:true={jobs}>
            <template for:each={jobs} for:item="job">
                <div key={job.Id} class="slds-box slds-m-around_small">
                    <p><strong>Name:</strong> {job.Name}</p>
                    <p><strong>Title:</strong> {job.Job_Title__c}</p>
                    <p><strong>Company:</strong> {job.Company__c}</p>
                    <p><strong>Location:</strong> {job.Location__c}</p>
                    <p><strong>Type:</strong> {job.Job_Type__c}</p>
                    <p><strong>Salary:</strong> {job.Salary_Range__c}</p>

                    <lightning-button
                        label="Apply"
                        variant="brand"
                        data-id={job.Id}
                        onclick={handleApply}
                        class="slds-m-top_small">
                    </lightning-button>
                </div>
            </template>
        </template>

        <template if:true={showForm}>
            <div class="slds-box slds-m-around_medium">
                <h2 class="slds-text-heading_medium slds-m-bottom_medium">Apply for Job</h2>

                <lightning-input
                    type="url"
                    label="Resume URL"
                    value={resumeUrl}
                    onchange={handleResumeChange}>
                </lightning-input>

                <lightning-textarea
                    label="Cover Letter"
                    value={coverLetter}
                    onchange={handleCoverChange}>
                </lightning-textarea>

                <lightning-button
                    label="Submit Application"
                    variant="brand"
                    onclick={submitApplication}
                    class="slds-m-top_medium">
                </lightning-button>
            </div>
        </template>

        <template if:true={error}>
            <p class="slds-text-color_error slds-m-around_small">
                Error loading jobs.
            </p>
        </template>
    </lightning-card>
</template>
